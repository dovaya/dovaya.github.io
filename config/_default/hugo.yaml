baseURL: "https://dovaya.github.io"
timeZone: "Europe/Zurich"
locale: "en-US"
languageDirection: ltr
languageName: English
title: "Dovaya"
copyright: dovaya. All rights reserved.

caches:
  images:
    dir: :cacheDir/images

theme: "dovaya-hugo-theme"
module:
  hugoVersion:
    min: "0.146.0"
    
markup:
  goldmark:
    extensions:
      extras:
        superscript:
          enable: true
    renderHooks:
      link:
        useEmbedded: fallback
    parser:
      attribute:
        title: true

pagination:
  disableAliases: false
  pagerSize: 5

params:
  author:
    name: "Dovaya"
    description:
      - Computer Scientist. 
      - Visual Artist. 
      - Video Game Modder.
    contact: "dovaya.dev@gmail.com"
    links:
      nexusmods: 
        title: NexusMods
        url: "https://next.nexusmods.com/profile/dovaya"
        svg: nexusmods_mono
        position: 1
      github: 
        title: GitHub
        url: https://github.com/dovaya
        svg: github-svgrepo-com
        position: 2
      youtube: 
        title: YouTube
        url: "https://www.youtube.com/@dovaya"
        svg: youtube-svgrepo-com
        position: 3
      discord: 
        title: Discord
        url: "https://discord.com/users/873689321851461712"
        svg: discord-svgrepo-com
        position: 4
      reddit: 
        title: Reddit
        url: https://www.reddit.com/user/dovaya/
        svg: reddit-svgrepo-com
        position: 5
      tumblr:
        title: Tumblr
        url: https://dovaya.tumblr.com/
        svg: tumblr-svgrepo-com
        position: 6
  description: Official Website of Dovaya.
  images:
    - logo.jpg
  launchYear: 2025

permalinks:
  page:
    blog: "/blog/:year/:month/:day/:slug"
